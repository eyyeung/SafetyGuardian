<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8BDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8F96A0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGradient)"/>

  <!-- Shield outline (safety/protection symbol) -->
  <path d="M 512 150 L 750 250 L 750 450 Q 750 700 512 850 Q 274 700 274 450 L 274 250 Z"
        fill="url(#shieldGradient)"
        stroke="#FFFFFF"
        stroke-width="20"/>

  <!-- Eye symbol (vision/detection) -->
  <ellipse cx="512" cy="450" rx="180" ry="100" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="512" cy="450" r="70" fill="#357ABD"/>
  <circle cx="512" cy="450" r="40" fill="#2C3E50"/>
  <circle cx="530" cy="430" r="15" fill="#FFFFFF" opacity="0.8"/>

  <!-- Mustache smile -->
  <path d="M 360 585
           C 415 530 495 530 512 585
           C 529 530 609 530 664 585
           C 639 655 559 655 512 615
           C 465 655 385 655 360 585 Z"
        fill="#2C3E50"
        opacity="0.9"/>

  <!-- Small guardian stars/sparkles removed -->
</svg>
